services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}

    ports:
      - "5432:5432"

  loki:
    image: grafana/loki:3.0.0

    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.0.0

    ports:
      - "3001:3000"

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile

    environment:
      LOKI_URL: http://loki:3100
      IAM_GRPC_URL: iam-service:5001
      CATALOG_GRPC_URL: catalog-service:5002

    ports:
      - "3000:3000"

    depends_on:
      - iam-service
      - loki

  iam-service:
    build:
      context: .
      dockerfile: apps/iam-service/Dockerfile

    environment:
      LOKI_URL: http://loki:3100
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "50051:5001"

    depends_on:
      - postgres
      - loki

  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile

    environment:
      LOKI_URL: http://loki:3100
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "50052:5003"

    depends_on:
      - postgres
      - loki
